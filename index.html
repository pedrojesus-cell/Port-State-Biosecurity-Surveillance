<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Global Port Marine Biosecurity Monitor</title>
  
  <!-- Tailwind CSS & Leaflet Dependencies -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <style>
    #map { height: 600px; width: 100%; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans">

  <!-- Main Navigation Header -->
  <header class="border-b border-slate-800 bg-slate-950 p-6">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-bold text-teal-400">Global Coastal Biosecurity & Port Surveillance</h1>
        <p class="text-sm text-slate-400">Marine Biological Invasion Risk Baseline via Global Fishing Watch API</p>
      </div>
      <div class="flex gap-3">
        <span class="px-3 py-1 bg-red-900/50 border border-red-500 text-red-300 text-xs rounded-full flex items-center gap-2">
          <span class="h-2 w-2 rounded-full bg-red-500 animate-pulse"></span> High Fouling Risk
        </span>
        <span class="px-3 py-1 bg-yellow-900/50 border border-yellow-500 text-yellow-300 text-xs rounded-full flex items-center gap-2">
          <span class="h-2 w-2 rounded-full bg-yellow-500"></span> Moderate Vector
        </span>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto p-6 space-y-6">
    
    <!-- Analytics KPI Indicators -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <div class="bg-slate-800 border border-slate-700 p-4 rounded-xl">
        <div class="text-slate-400 text-xs uppercase font-semibold">Monitored Port Visits</div>
        <div id="kpi-total-entries" class="text-3xl font-bold text-slate-100 mt-1">--</div>
      </div>
      <div class="bg-slate-800 border border-slate-700 p-4 rounded-xl">
        <div class="text-slate-400 text-xs uppercase font-semibold">High-Risk Bio-Vectors</div>
        <div id="kpi-high-risk" class="text-3xl font-bold text-red-400 mt-1">--</div>
      </div>
      <div class="bg-slate-800 border border-slate-700 p-4 rounded-xl">
        <div class="text-slate-400 text-xs uppercase font-semibold">Avg Residence Time</div>
        <div id="kpi-avg-residence" class="text-3xl font-bold text-teal-400 mt-1">-- hrs</div>
      </div>
      <div class="bg-slate-800 border border-slate-700 p-4 rounded-xl">
        <div class="text-slate-400 text-xs uppercase font-semibold">Coordinated Regions</div>
        <div class="text-3xl font-bold text-slate-100 mt-1">Global / EEZ</div>
      </div>
    </div>

    <!-- Map Engine & Event Stream -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="lg:col-span-2 bg-slate-800 border border-slate-700 rounded-xl overflow-hidden p-2">
        <div id="map" class="rounded-lg"></div>
      </div>
      
      <div class="bg-slate-800 border border-slate-700 rounded-xl p-4 flex flex-col h-[616px]">
        <h2 class="text-lg font-semibold text-slate-200 mb-4">Port Arrival Risk Feed</h2>
        <div id="event-feed" class="space-y-3 overflow-y-auto flex-1 pr-2">
          <!-- Dynamically populated via JavaScript -->
        </div>
      </div>
    </div>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
