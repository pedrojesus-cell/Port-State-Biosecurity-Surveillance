name: GFW Biosecurity Data Sync

on:
  schedule:
    # Runs daily at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  build-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: Fetch and Process Port Entries
        env:
          GFW_API_TOKEN: ${{ secrets.GFW_API_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python scripts/process_port_risks.py

      - name: Commit and Push Updated Baseline Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage both JSON and CSV dataset artifacts
          git add data/baseline_risk.json data/high_risk_summary.csv
          
          # Commit only if changes are detected
          git commit -m "auto: update biosecurity baseline and high-risk csv [skip ci]" || exit 0
          git push
