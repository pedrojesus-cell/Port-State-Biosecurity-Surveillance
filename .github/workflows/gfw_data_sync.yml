name: GFW Biosecurity Data Sync

on:
  schedule:
    - cron: '0 2 * * *' # Runs automatically every day at 02:00 UTC
  workflow_dispatch:     # Allows manually triggering the run from Actions tab

permissions:
  contents: write        # Permits the workflow to commit updated JSON data back to repo

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch and Process Port Entries
        env:
          GFW_API_TOKEN: ${{ secrets.GFW_API_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python scripts/process_port_risks.py

      - name: Commit and Push Updated Baseline Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff-index --quiet HEAD || git commit -m "Auto-update port biosecurity baseline [skip ci]"
          git push
