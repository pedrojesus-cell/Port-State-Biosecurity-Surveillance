- name: Commit and Push Updated Baseline Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage all generated files inside the data directory
          git add data/
          
          # Commit and push only if changes exist
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update biosecurity baseline data [skip ci]" && git push)
