name: GFW Biosecurity Data Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # Runs weekly automatically

jobs:
  build-and-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run port risk processing
        run: |
          python scripts/process_port_risks.py

      - name: Commit and push processed data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/baseline_risk.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update biosecurity baseline data" && git push)
